<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="100%" height="100%">
  <!-- Icon: Graduation Cap + Forward Arrow -->
  <g transform="translate(10, 15)">
    <!-- Mortarboard Top (Diamond) -->
    <polygon points="35,10 60,22 35,34 10,22" fill="#B45309" />
    <!-- Tassel -->
    <path d="M 35 22 L 20 28 L 20 38" fill="none" stroke="#B45309" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="20" cy="40" r="2.5" fill="#B45309" />
    
    <!-- Forward/Upward Arrow below the cap -->
    <path d="M 22 46 L 48 46" stroke="#111827" stroke-width="5" stroke-linecap="round" />
    <path d="M 38 38 L 48 46 L 38 54" fill="none" stroke="#111827" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  
  <!-- Wordmark -->
  <text x="95" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="500" fill="#111827">Find<tspan font-weight="700" fill="#B45309">Ship</tspan></text>
</svg>
