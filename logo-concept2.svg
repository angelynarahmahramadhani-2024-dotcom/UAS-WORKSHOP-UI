  </g>
  
  <!-- Wordmark -->
  <text x="95" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="500" fill="#111827">Find<tspan font-weight="700" fill="#B45309">Ship</tspan></text>
